
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Added viewport-fit=cover to properly handle mobile device notches and safe areas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile 3D Studio Director</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://unpkg.com/mp4-muxer/build/mp4-muxer.js"></script>

    <style>
        /* Changed to physical 100% heights to prevent mobile browser URL/Nav bars from clipping the bottom UI */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #1a1a1a; touch-action: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            user-select: none; -webkit-user-select: none; 
        }
        
        #canvas-container { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
        
        /* Updated UI Layer to respect safe area insets natively */
        #ui-layer { 
            position: absolute; inset: 0; width: 100%; 
            height: 100%; height: 100dvh; /* dynamic height support */
            pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; 
            box-sizing: border-box;
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
        }

        .interactive { pointer-events: auto; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #4b5563; border-radius: 2px; }

        input[type="color"] { -webkit-appearance: none; border: none; width: 32px; height: 32px; border-radius: 50%; overflow: hidden; padding: 0; background: none; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #4b5563; border-radius: 50%; }

        @keyframes pulse-border {
            0% { border-color: #3b82f6; box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { border-color: #93c5fd; box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { border-color: #3b82f6; box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .rigging-mode { animation: pulse-border 1.5s infinite; border: 2px solid #3b82f6 !important; }
        
        @keyframes pulse-border-green {
            0% { border-color: #10b981; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { border-color: #6ee7b7; box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { border-color: #10b981; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .joint-mode { animation: pulse-border-green 1.5s infinite; border: 2px solid #10b981 !important; }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .recording-pulse { animation: pulse-red 1s infinite; }
        
        #baking-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #baking-overlay.active { opacity: 1; pointer-events: auto; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white antialiased">

    <div id="baking-overlay">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold mb-2">Baking Video...</h2>
        <p id="baking-progress" class="text-blue-400 font-mono">Initializing</p>
        <p class="text-xs text-gray-500 mt-4">Do not minimize or close tab</p>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        
        <!-- Top Header -->
        <div class="flex justify-between items-start interactive w-full">
            <div class="bg-gray-900/80 backdrop-blur-md px-4 py-2 rounded-2xl shadow-lg border border-gray-700/50 flex items-center gap-3">
                <h1 class="font-bold text-sm bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">3D Studio Director</h1>
                <div class="w-px h-4 bg-gray-700"></div>
                <button onclick="saveProject()" class="text-gray-300 hover:text-white transition" title="Save Entire Scene"><i data-lucide="save" class="w-4 h-4"></i></button>
                <label class="text-gray-300 hover:text-white transition cursor-pointer" title="Load Scene">
                    <i data-lucide="folder-open" class="w-4 h-4"></i>
                    <input type="file" id="load-project" accept=".json" class="hidden" onchange="loadProject(event)">
                </label>
            </div>
            
            <div id="rec-indicator" class="hidden bg-red-900/80 backdrop-blur-md px-3 py-1.5 rounded-full shadow-lg border border-red-500/50 flex items-center gap-2 pointer-events-none">
                <div class="w-2.5 h-2.5 rounded-full bg-red-500 recording-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                <span class="text-xs font-bold text-red-100 tracking-wider">REC</span>
            </div>
        </div>

        <!-- Toast Messages -->
        <div id="toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-gray-800/95 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none border border-gray-600 z-50 whitespace-nowrap">
            Message
        </div>

        <!-- Left Toolbar -->
        <div class="absolute left-4 top-1/2 transform -translate-y-1/2 flex flex-col gap-2 interactive bg-gray-900/90 backdrop-blur-md p-2 rounded-2xl border border-gray-700/50 shadow-xl z-20">
            <button onclick="setMode('translate')" class="nav-btn mode-btn p-3 rounded-xl text-blue-400 bg-gray-800 shadow-inner hover:text-white transition-all" data-mode="translate">
                <i data-lucide="move" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
            <button onclick="setMode('rotate')" class="nav-btn mode-btn p-3 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 transition-all" data-mode="rotate">
                <i data-lucide="rotate-cw" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
            <button onclick="setMode('scale')" class="nav-btn mode-btn p-3 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 transition-all" data-mode="scale">
                <i data-lucide="maximize" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
            
            <div class="w-full h-px bg-gray-800 my-1"></div>

            <button id="left-btn-magnet" onclick="toggleMagnetMode()" class="p-3 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 transition-all">
                <i data-lucide="magnet" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
            
            <button onclick="toggleGrid()" id="left-btn-grid" class="p-3 rounded-xl text-blue-400 bg-gray-800 transition-all">
                <i data-lucide="grid-3x3" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
            <button onclick="undo()" class="p-3 rounded-xl text-amber-400 hover:text-amber-300 active:bg-gray-800 transition-all mt-1">
                <i data-lucide="undo-2" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
        </div>

        <!-- Bottom Controls -->
        <div class="flex flex-col gap-2 interactive w-full max-w-lg mx-auto relative z-20 mt-auto">
            
            <!-- Dynamic Submenus -->
            <div id="submenu-container" class="relative">
                
                <!-- ADD MENU -->
                <div id="menu-add" class="submenu hidden flex gap-3 overflow-x-auto no-scrollbar p-1 pb-2">
                    <button onclick="addObject('cube')" class="flex flex-col items-center justify-center bg-gray-800/95 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0">
                        <i data-lucide="box" class="w-6 h-6 mb-1 text-blue-400"></i><span class="text-[10px]">Cube</span>
                    </button>
                    <button onclick="addObject('sphere')" class="flex flex-col items-center justify-center bg-gray-800/95 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0">
                        <i data-lucide="circle" class="w-6 h-6 mb-1 text-green-400"></i><span class="text-[10px]">Sphere</span>
                    </button>
                    <button onclick="addObject('cone')" class="flex flex-col items-center justify-center bg-gray-800/95 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0">
                        <i data-lucide="triangle" class="w-6 h-6 mb-1 text-yellow-400"></i><span class="text-[10px]">Cone</span>
                    </button>
                    <button onclick="addObject('plane')" class="flex flex-col items-center justify-center bg-gray-800/95 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0">
                        <i data-lucide="square" class="w-6 h-6 mb-1 text-gray-400"></i><span class="text-[10px]">Plane</span>
                    </button>
                    <button onclick="addObject('light')" class="flex flex-col items-center justify-center bg-gray-800/95 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0">
                        <i data-lucide="sun" class="w-6 h-6 mb-1 text-yellow-200"></i><span class="text-[10px]">Light</span>
                    </button>
                    <button onclick="addObject('camera')" class="flex flex-col items-center justify-center bg-gray-800/95 border border-green-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0 relative overflow-hidden">
                        <div class="absolute inset-0 bg-green-500/10"></div>
                        <i data-lucide="video" class="w-6 h-6 mb-1 text-green-400 relative z-10"></i><span class="text-[10px] text-green-300 relative z-10">Camera</span>
                    </button>
                </div>

                <!-- MODEL/EDIT MENU -->
                <div id="menu-edit" class="submenu hidden flex flex-col gap-2 p-3 bg-gray-900/95 border border-gray-700 rounded-2xl shadow-2xl mb-1">
                    <div class="flex justify-between items-center bg-gray-800/80 p-2 rounded-lg border border-gray-600 shadow-inner">
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1">
                            <i data-lucide="ruler" class="w-3 h-3"></i> Size
                        </div>
                        <div class="flex gap-2 text-xs items-center">
                            <span class="text-gray-500 font-mono">W</span><input type="number" id="dim-w" class="w-12 bg-gray-900 text-white rounded text-center border border-gray-700 outline-none" step="0.1" onchange="updateDimensions()">
                            <span class="text-gray-500 font-mono">H</span><input type="number" id="dim-h" class="w-12 bg-gray-900 text-white rounded text-center border border-gray-700 outline-none" step="0.1" onchange="updateDimensions()">
                            <span class="text-gray-500 font-mono">D</span><input type="number" id="dim-d" class="w-12 bg-gray-900 text-white rounded text-center border border-gray-700 outline-none" step="0.1" onchange="updateDimensions()">
                        </div>
                    </div>

                    <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                        <div class="flex flex-col items-center justify-center bg-gray-800 border border-gray-600 rounded-xl w-16 h-16 relative shrink-0">
                            <input type="color" id="color-picker" class="absolute opacity-0 w-full h-full cursor-pointer z-10" oninput="changeColor(event)">
                            <div id="color-display" class="w-6 h-6 rounded-full border-2 border-gray-400 mb-1 pointer-events-none" style="background-color: #ffffff;"></div>
                            <span class="text-[10px] pointer-events-none">Color</span>
                        </div>
                        <label class="flex flex-col items-center justify-center bg-gray-800 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0 cursor-pointer">
                            <i data-lucide="image" class="w-6 h-6 mb-1 text-emerald-400"></i>
                            <span class="text-[10px]">Texture</span>
                            <input type="file" accept="image/jpeg, image/png" class="hidden" onchange="applyTexture(event)">
                        </label>
                        
                        <div class="w-px h-12 bg-gray-700 self-center shrink-0"></div>

                        <button onclick="cloneSelected()" class="flex flex-col items-center justify-center bg-gray-800 border border-gray-600 rounded-xl w-16 h-16 active:bg-gray-700 shrink-0">
                            <i data-lucide="copy" class="w-6 h-6 mb-1 text-indigo-400"></i><span class="text-[10px]">Clone</span>
                        </button>
                        <button onclick="deleteSelected()" class="flex flex-col items-center justify-center bg-red-900/40 border border-red-700/50 rounded-xl w-16 h-16 active:bg-red-800/60 shrink-0 ml-auto">
                            <i data-lucide="trash-2" class="w-6 h-6 mb-1 text-red-400"></i><span class="text-[10px] text-red-200">Delete</span>
                        </button>
                    </div>
                </div>

                <!-- RIG MENU -->
                <div id="menu-rig" class="submenu hidden flex gap-3 overflow-x-auto no-scrollbar p-1 pb-2 w-full">
                    <div class="bg-gray-900/95 border border-gray-700 rounded-2xl p-3 w-full shadow-lg">
                        <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Hierarchy & Joints</div>
                        <div id="hierarchy-status" class="text-sm text-gray-300 mb-3 bg-gray-800 p-2 rounded truncate">No Object Selected</div>
                        
                        <div class="flex gap-2 mb-3">
                            <button id="btn-parent" onclick="startRigging()" class="flex-1 bg-indigo-600/90 py-2 rounded-lg text-sm font-semibold active:bg-indigo-500 flex items-center justify-center gap-2 border border-indigo-400/30">
                                <i data-lucide="link" class="w-4 h-4"></i> Set Parent
                            </button>
                            <button onclick="unparentSelected()" class="flex-1 bg-gray-700 py-2 rounded-lg text-sm font-semibold active:bg-gray-600 flex items-center justify-center gap-2 border border-gray-500">
                                <i data-lucide="unlink" class="w-4 h-4"></i> Detach
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ANIMATION MENU -->
                <div id="menu-anim" class="submenu hidden flex-col gap-2 p-3 bg-gray-900/95 border border-gray-700 rounded-2xl shadow-2xl mb-1">
                    <div class="flex justify-between items-center pl-1">
                        <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="clock" class="w-4 h-4"></i> Timeline Editor
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyAnim()" class="text-gray-400 hover:text-white" title="Copy Anim"><i data-lucide="copy" class="w-4 h-4"></i></button>
                            <button onclick="pasteAnim()" class="text-gray-400 hover:text-white" title="Paste Anim"><i data-lucide="clipboard-paste" class="w-4 h-4"></i></button>
                            <button id="btn-stop" class="bg-red-500/90 p-1 rounded active:bg-red-400 ml-2">
                                <i data-lucide="square" class="w-3 h-3 fill-current text-white"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="bg-gray-800/80 p-2 rounded-lg border border-gray-600 shadow-inner flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <div class="text-xs text-gray-300">
                                Poses: <span id="kf-count" class="text-white font-mono bg-gray-900 px-1.5 py-0.5 rounded border border-gray-700">0</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="clearKeyframes()" class="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-[10px] text-gray-300 transition-colors border border-gray-600">Clear</button>
                                <button onclick="popKeyframe()" class="bg-amber-600/80 hover:bg-amber-500 px-2 py-1 rounded text-[10px] text-white transition-colors border border-amber-500">Pop Last</button>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="updateLastKeyframe()" class="flex-1 bg-indigo-600/80 hover:bg-indigo-500 py-1.5 rounded text-xs text-white font-medium border border-indigo-500">Update Last</button>
                            <button onclick="addKeyframe()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-1.5 rounded text-xs text-white font-bold shadow-lg border border-blue-500">+ Add Pose</button>
                        </div>
                    </div>

                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700/50 grid grid-cols-2 gap-2">
                        <div class="col-span-2 flex items-center gap-2 text-xs">
                            <span class="text-gray-400 w-12">Dur:</span>
                            <input type="range" id="anim-duration" min="0.1" max="10" step="0.1" value="2" class="flex-1">
                            <span id="dur-label" class="w-8 text-right font-mono">2.0s</span>
                        </div>
                        <div class="col-span-2 flex items-center gap-2 text-xs">
                            <span class="text-gray-400 w-12">Delay:</span>
                            <input type="range" id="anim-delay" min="0" max="5" step="0.1" value="0" class="flex-1">
                            <span id="delay-label" class="w-8 text-right font-mono">0.0s</span>
                        </div>
                        <select id="anim-ease" class="bg-gray-800 text-xs text-white rounded border border-gray-600 px-1 py-1 outline-none">
                            <option value="quad">Smooth (Quad)</option>
                            <option value="linear">Linear</option>
                            <option value="sine">Sine</option>
                            <option value="expo">Sharp (Expo)</option>
                            <option value="back">Overshoot (Back)</option>
                            <option value="bounce">Bounce</option>
                            <option value="elastic">Elastic</option>
                        </select>
                        <select id="anim-loop" class="bg-gray-800 text-xs text-white rounded border border-gray-600 px-1 py-1 outline-none">
                            <option value="none">Play Once</option>
                            <option value="repeat">Loop</option>
                            <option value="yoyo">Ping-Pong</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="playAnimation(true)" class="flex-1 bg-green-600/90 py-2 rounded-lg font-semibold text-xs active:bg-green-500 border border-green-500">Play Object</button>
                        <button onclick="playAnimation(false)" class="flex-1 bg-blue-600/90 py-2 rounded-lg font-semibold text-xs active:bg-blue-500 border border-blue-500">Play Scene</button>
                    </div>
                </div>

                <!-- RENDER MENU -->
                <div id="menu-render" class="submenu hidden flex-col gap-3 p-3 bg-gray-900/95 border border-gray-700 rounded-2xl shadow-2xl mb-1 w-full">
                    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider pl-1 mb-1">Camera & Output</div>
                    
                    <button id="btn-camera-preview" onclick="toggleCameraPreview()" class="w-full bg-gray-800 border border-gray-600 py-2 rounded-lg text-xs font-semibold hover:bg-gray-700 active:bg-gray-600 flex items-center justify-center gap-2">
                        <i data-lucide="eye" class="w-4 h-4 text-gray-300"></i><span id="lbl-cam-preview">Preview Scene Camera</span>
                    </button>

                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700/50 flex flex-col gap-2">
                        <div class="flex gap-2">
                            <select id="export-res" class="flex-1 bg-gray-800 text-xs text-white rounded border border-gray-600 px-2 py-1.5 outline-none">
                                <option value="screen">Screen Size</option>
                                <option value="720">720p (1280x720)</option>
                                <option value="1080">1080p (1920x1080)</option>
                            </select>
                            <select id="export-fps" class="flex-1 bg-gray-800 text-xs text-white rounded border border-gray-600 px-2 py-1.5 outline-none">
                                <option value="30">30 FPS</option>
                                <option value="60">60 FPS</option>
                            </select>
                        </div>
                    </div>
                    
                    <button onclick="exportVideo()" class="w-full bg-red-600/90 hover:bg-red-500 py-3 rounded-lg font-semibold text-sm flex items-center justify-center gap-2 shadow-lg shadow-red-900/20 border border-red-500/50">
                        <i data-lucide="video" class="w-5 h-5"></i> Bake Video
                    </button>
                </div>

            </div>

            <!-- Main Navigation Tabs -->
            <div id="main-nav" class="bg-gray-900/95 backdrop-blur-xl rounded-2xl p-1.5 flex justify-between items-center shadow-2xl border border-gray-700 transition-all duration-300">
                <button onclick="toggleTab('add')" id="tab-add" class="tab-btn flex-1 py-2 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 flex flex-col items-center gap-1">
                    <i data-lucide="plus-square" class="w-5 h-5"></i><span class="text-[9px] font-medium hidden sm:block">Add</span>
                </button>
                <button onclick="toggleTab('edit')" id="tab-edit" class="tab-btn flex-1 py-2 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 flex flex-col items-center gap-1">
                    <i data-lucide="palette" class="w-5 h-5"></i><span class="text-[9px] font-medium hidden sm:block">Model</span>
                </button>
                <button onclick="toggleTab('rig')" id="tab-rig" class="tab-btn flex-1 py-2 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 flex flex-col items-center gap-1">
                    <i data-lucide="git-merge" class="w-5 h-5"></i><span class="text-[9px] font-medium hidden sm:block">Rig</span>
                </button>
                <button onclick="toggleTab('anim')" id="tab-anim" class="tab-btn flex-1 py-2 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 flex flex-col items-center gap-1">
                    <i data-lucide="clapperboard" class="w-5 h-5"></i><span class="text-[9px] font-medium hidden sm:block">Anim</span>
                </button>
                <div class="w-px h-6 bg-gray-700 mx-1"></div>
                <button onclick="toggleTab('render')" id="tab-render" class="tab-btn flex-1 py-2 rounded-xl text-gray-400 hover:text-white active:bg-gray-800 flex flex-col items-center gap-1">
                    <i data-lucide="film" class="w-5 h-5"></i><span class="text-[9px] font-medium hidden sm:block">Render</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const App = {
            scene: new THREE.Scene(),
            camera: null,
            renderer: null,
            orbit: null,
            transform: null,
            raycaster: new THREE.Raycaster(),
            mouse: new THREE.Vector2(),
            
            objects: [],
            selectedJoint: null,
            
            isRigging: false,
            isRecording: false,
            isBaking: false,
            isMagnetMode: false,
            isPreviewingCamera: false,
            
            history: [],
            gridGroup: new THREE.Group(),
            isGridVisible: true,
            
            pathLines: new THREE.Group(),
            animClipboard: null
        };

        const UI = {
            toast: document.getElementById('toast'),
            colorPicker: document.getElementById('color-picker'),
            colorDisplay: document.getElementById('color-display'),
            hierarchy: document.getElementById('hierarchy-status'),
            recIndicator: document.getElementById('rec-indicator'),
            nav: document.getElementById('main-nav')
        };

        const EASE_MAP = {
            'linear': TWEEN.Easing.Linear.None,
            'quad': TWEEN.Easing.Quadratic.InOut,
            'sine': TWEEN.Easing.Sinusoidal.InOut,
            'expo': TWEEN.Easing.Exponential.InOut,
            'back': TWEEN.Easing.Back.Out,
            'bounce': TWEEN.Easing.Bounce.Out,
            'elastic': TWEEN.Easing.Elastic.Out
        };

        function getVisual(joint) { return joint.children.find(c => c.userData.isVisual); }
        function getJoint(node) {
            let curr = node;
            while(curr && curr !== App.scene) {
                if (curr.userData.isJoint) return curr;
                curr = curr.parent;
            }
            return null;
        }

        function init() {
            const container = document.getElementById('canvas-container');

            App.scene.background = new THREE.Color(0x1e1e24);
            
            App.gridGroup.add(new THREE.GridHelper(50, 50, 0x555555, 0x333333));
            App.scene.add(App.gridGroup);
            App.scene.add(App.pathLines);

            App.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            App.camera.position.set(10, 8, 12);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444466, 0.5);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(15, 25, 15);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            
            App.scene.add(hemiLight);
            App.scene.add(dirLight);

            App.renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, powerPreference: "high-performance" });
            App.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            App.renderer.setSize(window.innerWidth, window.innerHeight);
            App.renderer.shadowMap.enabled = true;
            App.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            container.appendChild(App.renderer.domElement);

            App.orbit = new THREE.OrbitControls(App.camera, App.renderer.domElement);
            App.orbit.enableDamping = true;
            App.orbit.dampingFactor = 0.05;

            App.transform = new THREE.TransformControls(App.camera, App.renderer.domElement);
            App.transform.addEventListener('dragging-changed', e => { App.orbit.enabled = !e.value; });
            App.transform.addEventListener('change', () => { 
                if (App.selectedJoint) {
                    updateDimensionsUI();
                    if(App.selectedJoint.userData.anim.keys.length > 0) drawPaths();
                }
            });
            App.scene.add(App.transform);

            window.addEventListener('resize', onResize);
            App.renderer.domElement.addEventListener('pointerdown', onPointerDown);

            document.getElementById('anim-duration').addEventListener('input', e => {
                document.getElementById('dur-label').textContent = parseFloat(e.target.value).toFixed(1) + 's';
                updateAnimSettings();
            });
            document.getElementById('anim-delay').addEventListener('input', e => {
                document.getElementById('delay-label').textContent = parseFloat(e.target.value).toFixed(1) + 's';
                updateAnimSettings();
            });
            ['anim-ease', 'anim-loop'].forEach(id => document.getElementById(id).addEventListener('change', updateAnimSettings));
            
            document.getElementById('btn-stop').addEventListener('click', stopAnimations);

            addObject('cube');
            setMode('translate');
            animateLoop();
        }

        function createGeometry(type) {
            switch(type) {
                case 'cube': return new THREE.BoxGeometry(1, 1, 1);
                case 'sphere': return new THREE.SphereGeometry(0.6, 32, 32);
                case 'cone': return new THREE.ConeGeometry(0.6, 1.5, 32);
                case 'plane': return new THREE.PlaneGeometry(1, 1);
                default: return new THREE.BoxGeometry(1, 1, 1);
            }
        }

        function addObject(type) {
            const joint = new THREE.Group();
            joint.userData = { isJoint: true, anim: { keys: [], duration: 2000, delay: 0, ease: 'quad', loop: 'none', tweens: [] } };
            
            let visual;
            if (type === 'light') {
                visual = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                const light = new THREE.PointLight(0xffffff, 1, 20);
                visual.add(light);
                visual.userData.isLight = true;
                joint.position.y = 2;
            } else if (type === 'camera') {
                // A visual representation of a camera for the scene
                visual = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 1), new THREE.MeshStandardMaterial({color: 0x333333}));
                const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.5, 16), new THREE.MeshStandardMaterial({color: 0x111111}));
                lens.rotation.x = Math.PI / 2;
                lens.position.z = -0.6;
                visual.add(body, lens);
                
                const helper = new THREE.CameraHelper(new THREE.PerspectiveCamera(45, 16/9, 0.1, 5));
                visual.add(helper);
                
                visual.userData.isCamera = true;
                joint.position.y = 1.5;
            } else {
                visual = new THREE.Mesh(createGeometry(type), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.7, 0.6), side: type==='plane'?THREE.DoubleSide:THREE.FrontSide }));
                visual.castShadow = true; visual.receiveShadow = true;
                joint.position.y = 0.5;
            }
            
            visual.userData.isVisual = true;
            visual.userData.type = type;
            
            joint.add(visual);
            App.scene.add(joint);
            App.objects.push(joint);
            
            selectObject(joint);
            showToast("Added " + type);
        }

        function onResize() {
            if (App.isRecording || App.isBaking) return;
            App.camera.aspect = window.innerWidth / window.innerHeight;
            App.camera.updateProjectionMatrix();
            App.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerDown(e) {
            if (e.target !== App.renderer.domElement || App.isRecording || App.isBaking) return;
            
            App.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            App.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            App.raycaster.setFromCamera(App.mouse, App.camera);
            
            const visuals = [];
            App.scene.traverse(n => { if(n.userData.isVisual) visuals.push(n); });
            const hits = App.raycaster.intersectObjects(visuals, true);
            
            if (hits.length > 0) {
                const hitJoint = getJoint(hits[0].object);
                if (App.isRigging) executeRigging(hitJoint);
                else selectObject(hitJoint);
            } else if (App.raycaster.intersectObject(App.transform, true).length === 0) {
                deselectObject();
            }
        }

        function attachToAppropriateObject() {
            if (!App.selectedJoint) return;
            const visual = getVisual(App.selectedJoint);
            if (App.transform.getMode() === 'scale' && visual && !visual.userData.isLight && !visual.userData.isCamera) {
                App.transform.attach(visual);
            } else {
                App.transform.attach(App.selectedJoint);
            }
        }

        function selectObject(joint) {
            App.selectedJoint = joint;
            
            // Normalize scale to prevent shearing
            if (joint.scale.x !== 1 || joint.scale.y !== 1 || joint.scale.z !== 1) {
                const visual = getVisual(joint);
                if (visual && !visual.userData.isLight && !visual.userData.isCamera) {
                    visual.scale.multiply(joint.scale);
                    joint.scale.set(1, 1, 1);
                }
            }

            attachToAppropriateObject();
            
            App.scene.traverse(node => { if (node.userData.isVisual && node.material && node.material.emissive) node.material.emissive.setHex(0x000000); });
            joint.children.forEach(node => { if (node.userData.isVisual && node.material && node.material.emissive) node.material.emissive.setHex(0x222233); });
            
            updateUI();
            drawPaths();
        }

        function deselectObject() {
            App.selectedJoint = null;
            App.transform.detach();
            App.scene.traverse(node => { if (node.userData.isVisual && node.material && node.material.emissive) node.material.emissive.setHex(0x000000); });
            clearPaths();
            updateUI();
            document.querySelectorAll('.submenu').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('bg-gray-800', 'text-white'));
        }

        function setMode(mode) {
            App.transform.setMode(mode);
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('text-blue-400', 'bg-gray-800', 'shadow-inner');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.querySelector(`.mode-btn[data-mode="${mode}"]`);
            if (activeBtn) activeBtn.classList.add('text-blue-400', 'bg-gray-800', 'shadow-inner');
            attachToAppropriateObject();
        }

        function toggleMagnetMode() {
            App.isMagnetMode = !App.isMagnetMode;
            const btn = document.getElementById('left-btn-magnet');
            if (App.isMagnetMode) {
                btn.classList.add('text-yellow-400', 'bg-gray-800', 'shadow-inner');
                App.transform.setTranslationSnap(0.5);
                App.transform.setRotationSnap(THREE.MathUtils.degToRad(15));
                showToast("Snapping ON");
            } else {
                btn.classList.remove('text-yellow-400', 'bg-gray-800', 'shadow-inner');
                App.transform.setTranslationSnap(null);
                App.transform.setRotationSnap(null);
                showToast("Snapping OFF");
            }
        }
        
        function toggleGrid() {
            App.isGridVisible = !App.isGridVisible;
            App.gridGroup.visible = App.isGridVisible;
            showToast(App.isGridVisible ? "Grid ON" : "Grid OFF");
        }

        function updateUI() {
            if (!App.selectedJoint) return;
            
            const visual = getVisual(App.selectedJoint);
            if (visual && visual.material && visual.material.color) {
                const hex = '#' + visual.material.color.getHexString();
                UI.colorPicker.value = hex;
                UI.colorDisplay.style.backgroundColor = hex;
            }

            const pName = (App.selectedJoint.parent && App.selectedJoint.parent.type !== "Scene") ? "Parented" : "Scene Root";
            UI.hierarchy.innerHTML = `<span class="text-emerald-400 font-bold">[Object]</span> Loc: <span class="text-white">${pName}</span>`;

            const anim = App.selectedJoint.userData.anim;
            if (anim) {
                document.getElementById('kf-count').textContent = anim.keys.length;
                document.getElementById('anim-duration').value = anim.duration / 1000;
                document.getElementById('dur-label').textContent = (anim.duration / 1000).toFixed(1) + 's';
                document.getElementById('anim-delay').value = anim.delay / 1000;
                document.getElementById('delay-label').textContent = (anim.delay / 1000).toFixed(1) + 's';
                document.getElementById('anim-ease').value = anim.ease;
                document.getElementById('anim-loop').value = anim.loop;
            }
            updateDimensionsUI();
        }

        function updateDimensionsUI() {
            if(!App.selectedJoint) return;
            const visual = getVisual(App.selectedJoint);
            if(!visual || visual.userData.isLight || visual.userData.isCamera) return;
            
            const box = new THREE.Box3().setFromObject(visual);
            const size = new THREE.Vector3();
            box.getSize(size);
            
            document.getElementById('dim-w').value = size.x.toFixed(2);
            document.getElementById('dim-h').value = size.y.toFixed(2);
            document.getElementById('dim-d').value = size.z.toFixed(2);
        }

        function updateDimensions() {
            if(!App.selectedJoint) return;
            const visual = getVisual(App.selectedJoint);
            if(!visual || visual.userData.isLight || visual.userData.isCamera) return;

            const w = parseFloat(document.getElementById('dim-w').value) || 1;
            const h = parseFloat(document.getElementById('dim-h').value) || 1;
            const d = parseFloat(document.getElementById('dim-d').value) || 1;

            const box = new THREE.Box3().setFromObject(visual);
            const currentSize = new THREE.Vector3();
            box.getSize(currentSize);

            visual.scale.set(w / (currentSize.x / visual.scale.x), h / (currentSize.y / visual.scale.y), d / (currentSize.z / visual.scale.z));
        }

        function changeColor(e) {
            if (!App.selectedJoint) return;
            const hex = e.target.value;
            const visual = getVisual(App.selectedJoint);
            if (visual) {
                if (visual.userData.isLight) { visual.material.color.set(hex); visual.children[0].color.set(hex); } 
                else if (visual.material) visual.material.color.set(hex);
            }
            UI.colorDisplay.style.backgroundColor = hex;
        }

        function deleteSelected() {
            if (!App.selectedJoint) return;
            App.transform.detach();
            App.selectedJoint.parent.remove(App.selectedJoint);
            App.objects = App.objects.filter(o => o !== App.selectedJoint);
            deselectObject();
            showToast("Object deleted");
        }

        // Rigging System
        function startRigging() {
            if(!App.selectedJoint) return;
            App.isRigging = true;
            App.transform.detach();
            document.getElementById('btn-parent').innerHTML = `Select Parent...`;
            document.getElementById('btn-parent').classList.add('animate-pulse');
            showToast("Tap another object to set as Parent");
        }

        function executeRigging(targetJoint) {
            if(targetJoint === App.selectedJoint) return showToast("Cannot parent to itself!");
            targetJoint.attach(App.selectedJoint);
            App.isRigging = false;
            document.getElementById('btn-parent').innerHTML = `Set Parent`;
            document.getElementById('btn-parent').classList.remove('animate-pulse');
            showToast("Successfully Rigged!");
            updateUI();
        }

        function unparentSelected() {
            if(!App.selectedJoint || App.selectedJoint.parent === App.scene) return;
            App.scene.attach(App.selectedJoint);
            showToast("Detached to Scene Root");
            updateUI();
        }

        // Animation System
        function updateAnimSettings() {
            if(!App.selectedJoint) return;
            const anim = App.selectedJoint.userData.anim;
            anim.duration = parseFloat(document.getElementById('anim-duration').value) * 1000;
            anim.delay = parseFloat(document.getElementById('anim-delay').value) * 1000;
            anim.ease = document.getElementById('anim-ease').value;
            anim.loop = document.getElementById('anim-loop').value;
        }

        function copyAnim() {
            if(!App.selectedJoint) return;
            const anim = App.selectedJoint.userData.anim;
            if(anim.keys.length === 0) return showToast("No animation to copy");
            
            App.animClipboard = {
                duration: anim.duration, delay: anim.delay, ease: anim.ease, loop: anim.loop,
                keys: anim.keys.map(k => ({
                    pRelative: k.p.clone().sub(anim.keys[0].p),
                    rRelative: new THREE.Euler(k.r.x - anim.keys[0].r.x, k.r.y - anim.keys[0].r.y, k.r.z - anim.keys[0].r.z),
                    sRelative: k.s.clone().divide(anim.keys[0].s)
                }))
            };
            showToast("Animation Sequence Copied");
        }

        function pasteAnim() {
            if(!App.selectedJoint || !App.animClipboard) return showToast("Nothing to paste");
            const anim = App.selectedJoint.userData.anim;
            
            anim.duration = App.animClipboard.duration;
            anim.delay = App.animClipboard.delay;
            anim.ease = App.animClipboard.ease;
            anim.loop = App.animClipboard.loop;
            
            const visual = getVisual(App.selectedJoint);
            const scaleBase = (visual && !visual.userData.isLight && !visual.userData.isCamera) ? visual.scale.clone() : App.selectedJoint.scale.clone();
            const posBase = App.selectedJoint.position.clone();
            const rotBase = App.selectedJoint.rotation.clone();

            anim.keys = App.animClipboard.keys.map(k => ({
                p: posBase.clone().add(k.pRelative),
                r: new THREE.Euler(rotBase.x + k.rRelative.x, rotBase.y + k.rRelative.y, rotBase.z + k.rRelative.z),
                s: scaleBase.clone().multiply(k.sRelative)
            }));
            
            updateUI();
            drawPaths();
            showToast("Animation Pasted!");
        }

        function getScaleTarget(joint) {
            const visual = getVisual(joint);
            return (visual && !visual.userData.isLight && !visual.userData.isCamera) ? visual.scale : joint.scale;
        }

        function addKeyframe() {
            if (!App.selectedJoint) return;
            const anim = App.selectedJoint.userData.anim;
            anim.keys.push({
                p: App.selectedJoint.position.clone(),
                r: App.selectedJoint.rotation.clone(),
                s: getScaleTarget(App.selectedJoint).clone()
            });
            updateUI();
            drawPaths();
            showToast(`Pose ${anim.keys.length} added!`);
        }

        function updateLastKeyframe() {
            if (!App.selectedJoint) return;
            const anim = App.selectedJoint.userData.anim;
            if(anim.keys.length === 0) return showToast("No poses to update");
            
            const last = anim.keys[anim.keys.length - 1];
            last.p.copy(App.selectedJoint.position);
            last.r.copy(App.selectedJoint.rotation);
            last.s.copy(getScaleTarget(App.selectedJoint));
            drawPaths();
            showToast("Last pose updated");
        }

        function popKeyframe() {
            if (!App.selectedJoint) return;
            const anim = App.selectedJoint.userData.anim;
            if(anim.keys.length === 0) return;
            anim.keys.pop();
            updateUI();
            drawPaths();
            showToast("Removed last pose");
        }

        function clearKeyframes() {
            if (!App.selectedJoint) return;
            App.selectedJoint.userData.anim.keys = [];
            updateUI();
            drawPaths();
            showToast("Timeline cleared");
        }

        function clearPaths() {
            while(App.pathLines.children.length > 0) App.pathLines.remove(App.pathLines.children[0]);
        }

        function drawPaths() {
            clearPaths();
            if(!App.selectedJoint) return;
            const anim = App.selectedJoint.userData.anim;
            if(!anim || anim.keys.length < 2) return;

            const points = anim.keys.map(k => k.p);
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineDashedMaterial({ color: 0x3b82f6, dashSize: 0.2, gapSize: 0.1 });
            const line = new THREE.Line(geo, mat);
            line.computeLineDistances();
            App.pathLines.add(line);

            points.forEach((p, i) => {
                const marker = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color: i===0?0x10b981:0x3b82f6}));
                marker.position.copy(p);
                App.pathLines.add(marker);
            });
        }

        function buildTweens(joint) {
            const anim = joint.userData.anim;
            if (!anim || !anim.keys || anim.keys.length < 2) return false;
            
            anim.tweens.forEach(t => t.stop());
            anim.tweens = [];

            joint.position.copy(anim.keys[0].p);
            joint.rotation.copy(anim.keys[0].r);
            getScaleTarget(joint).copy(anim.keys[0].s);

            const easeFn = EASE_MAP[anim.ease] || TWEEN.Easing.Quadratic.InOut;
            const segTime = anim.duration / (anim.keys.length - 1);
            const delay = anim.delay || 0;

            function setupChain(target, prop) {
                let fwd = [];
                for(let i=0; i<anim.keys.length-1; i++) {
                    let tw = new TWEEN.Tween(target).to({x: anim.keys[i+1][prop].x, y: anim.keys[i+1][prop].y, z: anim.keys[i+1][prop].z}, segTime).easing(easeFn);
                    if(i===0) tw.delay(delay);
                    fwd.push(tw);
                }
                for(let i=0; i<fwd.length-1; i++) fwd[i].chain(fwd[i+1]);

                if (anim.loop === 'repeat') {
                    fwd[fwd.length-1].onComplete(() => {
                        target.copy(anim.keys[0][prop]);
                        fwd[0].start();
                    });
                } else if (anim.loop === 'yoyo') {
                    let rev = [];
                    for(let i=anim.keys.length-1; i>0; i--) {
                        rev.push(new TWEEN.Tween(target).to({x: anim.keys[i-1][prop].x, y: anim.keys[i-1][prop].y, z: anim.keys[i-1][prop].z}, segTime).easing(easeFn));
                    }
                    for(let i=0; i<rev.length-1; i++) rev[i].chain(rev[i+1]);
                    
                    fwd[fwd.length-1].chain(rev[0]);
                    rev[rev.length-1].onComplete(() => { fwd[0].start(); });
                    anim.tweens.push(...rev);
                }

                fwd[0].start();
                anim.tweens.push(...fwd);
            }

            setupChain(joint.position, 'p');
            setupChain(joint.rotation, 'r');
            setupChain(getScaleTarget(joint), 's');
            return true;
        }

        function playAnimation(onlySelected = false) {
            App.transform.detach();
            clearPaths();
            
            let played = 0;
            if (onlySelected) {
                if (!App.selectedJoint) return showToast("Select an object");
                if (buildTweens(App.selectedJoint)) played++;
            } else {
                App.objects.forEach(joint => { if(buildTweens(joint)) played++; });
            }
            if(played > 0 && !App.isRecording) showToast("Playing Sequence...");
        }

        function stopAnimations() {
            TWEEN.removeAll();
            App.objects.forEach(joint => {
                const anim = joint.userData.anim;
                if(anim && anim.keys.length > 0) {
                    joint.position.copy(anim.keys[0].p);
                    joint.rotation.copy(anim.keys[0].r);
                    getScaleTarget(joint).copy(anim.keys[0].s);
                }
            });
            if(App.selectedJoint && !App.isRecording) { attachToAppropriateObject(); drawPaths(); }
        }

        function getSceneCamera() {
            return App.objects.find(j => {
                const v = getVisual(j);
                return v && v.userData.isCamera;
            });
        }

        function toggleCameraPreview() {
            const camObj = getSceneCamera();
            if(!camObj) return showToast("Add a Camera object to the scene first!");

            App.isPreviewingCamera = !App.isPreviewingCamera;
            const btn = document.getElementById('btn-camera-preview');
            const lbl = document.getElementById('lbl-cam-preview');
            
            if(App.isPreviewingCamera) {
                btn.classList.add('bg-green-600', 'border-green-500');
                btn.classList.remove('bg-gray-800');
                lbl.innerText = "Exit Camera View";
                App.orbit.enabled = false;
                App.transform.detach();
                getVisual(camObj).visible = false; 
                showToast("Locked to Scene Camera");
            } else {
                btn.classList.remove('bg-green-600', 'border-green-500');
                btn.classList.add('bg-gray-800');
                lbl.innerText = "Preview Scene Camera";
                App.orbit.enabled = true;
                getVisual(camObj).visible = true; 
                
                // Reset standard camera
                App.camera.position.set(10, 8, 12);
                App.camera.lookAt(0,0,0);
                App.camera.updateProjectionMatrix();
                
                if(App.selectedJoint) attachToAppropriateObject();
            }
        }

        async function bakeVideo() {
            if (!window.VideoEncoder) return showToast("Baking requires a modern browser.");

            const resSetting = document.getElementById('export-res').value;
            const fpsSetting = parseInt(document.getElementById('export-fps').value) || 30;

            const dims = resSetting === 'screen' ? [window.innerWidth, window.innerHeight] : { 
                '720': [1280, 720], '1080': [1920, 1080] 
            }[resSetting];
            
            const width = Math.floor(dims[0] / 2) * 2;
            const height = Math.floor(dims[1] / 2) * 2;

            let maxDur = 2000;
            App.objects.forEach(joint => {
                const anim = joint.userData.anim;
                if (anim && anim.keys.length > 1) maxDur = Math.max(maxDur, anim.duration + anim.delay);
            });

            const totalFrames = Math.floor((maxDur / 1000) * fpsSetting);
            
            const overlay = document.getElementById('baking-overlay');
            const progressTxt = document.getElementById('baking-progress');
            overlay.classList.add('active');
            
            const origW = window.innerWidth, origH = window.innerHeight, origAspect = App.camera.aspect;
            
            App.renderer.setSize(width, height);
            
            App.orbit.enabled = false; 
            hideAllTabs();
            deselectObject();
            
            App.isRecording = true;
            App.isBaking = true; 

            // Handle Camera perspective rendering
            let renderCamera = App.camera;
            const sceneCam = getSceneCamera();
            if (sceneCam) {
                getVisual(sceneCam).visible = false; 
                renderCamera = new THREE.PerspectiveCamera(45, width/height, 0.1, 100);
            } else {
                App.camera.aspect = width / height;
                App.camera.updateProjectionMatrix();
            }

            App.objects.forEach(j => { const v = getVisual(j); if(v && v.userData.isLight) v.visible = false; });
            App.gridGroup.visible = false;

            try {
                const muxer = new Mp4Muxer.Muxer({
                    target: new Mp4Muxer.ArrayBufferTarget(),
                    video: { codec: 'avc', width, height },
                    fastStart: 'in-memory'
                });

                const videoEncoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: e => { throw e; }
                });

                videoEncoder.configure({
                    codec: 'avc1.640034', width, height, bitrate: 15000000, framerate: fpsSetting
                });

                playAnimation(false);
                const frameDuration = 1000 / fpsSetting;
                let currentTime = 0;

                for (let f = 0; f < totalFrames; f++) {
                    TWEEN.update(currentTime);
                    
                    if (sceneCam) {
                        const wPos = new THREE.Vector3();
                        const wQuat = new THREE.Quaternion();
                        sceneCam.getWorldPosition(wPos);
                        sceneCam.getWorldQuaternion(wQuat);
                        renderCamera.position.copy(wPos);
                        renderCamera.quaternion.copy(wQuat);
                        
                        // Default Camera model points down Z. Rotate 180 to face standard forward.
                        renderCamera.rotateY(Math.PI);
                        renderCamera.updateMatrixWorld();
                    }

                    App.renderer.render(App.scene, renderCamera);
                    
                    const gl = App.renderer.getContext();
                    gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(4));

                    const bitmap = await createImageBitmap(App.renderer.domElement);
                    if (videoEncoder.state !== 'configured') break;

                    const frame = new VideoFrame(bitmap, { timestamp: f * 1000000 / fpsSetting });
                    videoEncoder.encode(frame, { keyFrame: f % fpsSetting === 0 });
                    frame.close();

                    currentTime += frameDuration;
                    if (f % 5 === 0) { progressTxt.innerText = `Baking: ${Math.round((f/totalFrames)*100)}%`; await new Promise(r => setTimeout(r, 0)); }
                }

                progressTxt.innerText = "Finalizing Video...";
                await videoEncoder.flush();
                muxer.finalize();

                const blob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `3D_Bake_${resSetting}_${fpsSetting}fps.mp4`; a.click();
                
            } catch(err) { console.error(err); showToast("Baking failed. See console."); }

            App.isRecording = false;
            App.isBaking = false;
            
            if(!App.isPreviewingCamera) App.orbit.enabled = true;
            App.renderer.setSize(origW, origH);
            App.camera.aspect = origAspect;
            App.camera.updateProjectionMatrix();
            App.gridGroup.visible = App.isGridVisible;
            if(sceneCam && !App.isPreviewingCamera) getVisual(sceneCam).visible = true;
            App.objects.forEach(j => { const v = getVisual(j); if(v && v.userData.isLight) v.visible = true; });
            overlay.classList.remove('active');
        }

        function hideAllTabs() {
            document.querySelectorAll('.submenu').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('bg-gray-800', 'text-white'));
            App.isRigging = false;
            document.getElementById('btn-parent').innerHTML = `Set Parent`;
            document.getElementById('btn-parent').classList.remove('animate-pulse');
        }

        function toggleTab(tabName) {
            if(App.isRecording || App.isBaking) return;
            const menu = document.getElementById(`menu-${tabName}`);
            const btn = document.getElementById(`tab-${tabName}`);
            const isVisible = !menu.classList.contains('hidden');
            hideAllTabs();
            if (!isVisible) {
                if (['edit', 'rig', 'anim'].includes(tabName) && !App.selectedJoint) return showToast(`Select object to use ${tabName}`);
                menu.classList.remove('hidden');
                btn.classList.add('bg-gray-800', 'text-white');
                updateUI();
            }
        }

        let toastTimeout;
        function showToast(msg) {
            UI.toast.textContent = msg;
            UI.toast.classList.remove('opacity-0', 'translate-y-2');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => UI.toast.classList.add('opacity-0', 'translate-y-2'), 3000);
        }

        function animateLoop(time) {
            requestAnimationFrame(animateLoop);
            if (App.isBaking) return; // Freeze background loop if generating video
            
            TWEEN.update(time);
            
            if (App.isPreviewingCamera) {
                const camObj = getSceneCamera();
                if (camObj) {
                    const wPos = new THREE.Vector3();
                    const wQuat = new THREE.Quaternion();
                    camObj.getWorldPosition(wPos);
                    camObj.getWorldQuaternion(wQuat);
                    
                    App.camera.position.copy(wPos);
                    App.camera.quaternion.copy(wQuat);
                    App.camera.rotateY(Math.PI); // Face forward
                    App.camera.updateMatrixWorld();
                }
            } else {
                App.orbit.update();
            }
            
            App.renderer.render(App.scene, App.camera);
        }

        window.onload = init;
    </script>
</body>
</html>
