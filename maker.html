        function buildTweens(joint) {
            const anim = joint.userData.anim;
            if (!anim || !anim.keys || anim.keys.length < 2) return false;
            
            anim.tweens.forEach(t => t.stop());
            anim.tweens = [];

            joint.position.copy(anim.keys[0].p);
            joint.rotation.copy(anim.keys[0].r);
            
            const visual = getVisual(joint);
            const scaleTarget = (visual && !joint.userData.isGroup && !visual.userData.isLight) ? visual.scale : joint.scale;
            scaleTarget.copy(anim.keys[0].s);

            const easeFn = EASE_MAP[anim.ease] || TWEEN.Easing.Quadratic.InOut;
            const segTime = anim.duration / (anim.keys.length - 1);

            function setupChain(target, prop) {
                let fwd = [];
                let rev = [];
                
                for(let i=0; i<anim.keys.length-1; i++) {
                    let next = anim.keys[i+1][prop];
                    fwd.push(new TWEEN.Tween(target).to({x: next.x, y: next.y, z: next.z}, segTime).easing(easeFn));
                }
                for(let i=0; i<fwd.length-1; i++) fwd[i].chain(fwd[i+1]);

                if (anim.loop === 'repeat') {
                    fwd[fwd.length-1].onComplete(() => {
                        target.copy(anim.keys[0][prop]);
                        fwd[0].start();
                    });
                } else if (anim.loop === 'yoyo') {
                    for(let i=anim.keys.length-1; i>0; i--) {
                        let prev = anim.keys[i-1][prop];
                        rev.push(new TWEEN.Tween(target).to({x: prev.x, y: prev.y, z: prev.z}, segTime).easing(easeFn));
                    }
                    for(let i=0; i<rev.length-1; i++) rev[i].chain(rev[i+1]);
                    
                    fwd[fwd.length-1].chain(rev[0]);
                    rev[rev.length-1].onComplete(() => { fwd[0].start(); });
                    anim.tweens.push(...rev);
                }

                // Add configured delay to the start of the chain
                if (anim.delay > 0) fwd[0].delay(anim.delay);

                fwd[0].start();
                anim.tweens.push(...fwd);
            }

            setupChain(joint.position, 'p');
            setupChain(joint.rotation, 'r');
            setupChain(scaleTarget, 's');

            return true;
        }

        function playAnimation(onlySelected = false) {
            App.transform.detach();
            if(App.pivotHelper) App.pivotHelper.visible = false;
            
            let played = 0;
            if (onlySelected) {
                if (!App.selectedJoint) return showToast("Select an object to play");
                if (buildTweens(App.selectedJoint)) played++;
                else return showToast("Add at least 2 Keyframes to play");
            } else {
                App.objects.forEach(joint => { if(buildTweens(joint)) played++; });
            }
            if(played > 0 && !App.isRecording) showToast(`Playing ${played} sequence(s)...`);
        }

        function stopAnimations() {
            TWEEN.removeAll();
            App.objects.forEach(joint => {
                const anim = joint.userData.anim;
                if(anim && anim.keys && anim.keys.length > 0) {
                    joint.position.copy(anim.keys[0].p);
                    joint.rotation.copy(anim.keys[0].r);
                    const visual = getVisual(joint);
                    const scaleTarget = (visual && !joint.userData.isGroup && !visual.userData.isLight) ? visual.scale : joint.scale;
                    scaleTarget.copy(anim.keys[0].s);
                }
            });
            if(App.selectedJoint && !App.isRecording) attachToAppropriateObject();
            if(!App.isRecording) showToast("Animations stopped");
        }

        async function bakeVideo(resSetting, fpsSetting) {
            if (!window.VideoEncoder) {
                showToast("Baking not supported on this browser. Using realtime fallback...");
                return exportVideoRealtime(resSetting, fpsSetting);
            }

            const dims = resSetting === 'screen' ? [window.innerWidth, window.innerHeight] : { 
                '480': [854, 480], '720': [1280, 720], '1080': [1920, 1080], '4k': [3840, 2160] 
            }[resSetting];
            
            const width = Math.floor(dims[0] / 2) * 2;
            const height = Math.floor(dims[1] / 2) * 2;

            let maxDur = 3000;
            App.objects.forEach(joint => {
                const anim = joint.userData.anim;
                if (anim && anim.keys && anim.keys.length > 1) {
                    let d = anim.duration + (anim.delay || 0);
                    if(anim.loop !== 'none') d = Math.max(d, 8000);
                    maxDur = Math.max(maxDur, d);
                }
            });

            const totalFrames = Math.floor((maxDur / 1000) * fpsSetting);
            
            const overlay = document.getElementById('baking-overlay');
            const progressTxt = document.getElementById('baking-progress');
            overlay.classList.add('active');
            
            const origPos = App.camera.position.clone();
            const origTarget = App.orbit.target.clone();
            const origW = window.innerWidth;
            const origH = window.innerHeight;
            const origAspect = App.camera.aspect;
            
            const animCam = getAnimCamera();
            let oldCamVis = true;

            if (animCam) {
                const v = getVisual(animCam);
                if (v) { oldCamVis = v.visible; v.visible = false; }
            } else if (App.cameraSaved.set) {
                App.camera.position.copy(App.cameraSaved.pos);
                App.orbit.target.copy(App.cameraSaved.target);
            } else { saveRenderCamera(); }

            App.renderer.setSize(width, height);
            App.camera.aspect = width / height;
            App.camera.updateProjectionMatrix();
            
            App.orbit.enabled = false; 
            hideAllTabs();
            deselectObject();
            App.isBaking = true;
            App.isRecording = true;

            App.objects.forEach(j => { const v = getVisual(j); if(v && v.userData.isLight) v.material.visible = false; });

            try {
                const muxer = new Mp4Muxer.Muxer({
                    target: new Mp4Muxer.ArrayBufferTarget(),
                    video: { codec: 'avc', width, height },
                    fastStart: 'in-memory'
                });

                const videoEncoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: e => { console.error("Encoder error:", e); throw e; }
                });

                videoEncoder.configure({
                    codec: 'avc1.640034',
                    width, height,
                    bitrate: 25000000,
                    framerate: fpsSetting
                });

                playAnimation(false);

                const frameDuration = 1000 / fpsSetting;
                let currentTime = window.performance.now();

                for (let f = 0; f < totalFrames; f++) {
                    TWEEN.update(currentTime);
                    if (animCam) {
                        animCam.getWorldPosition(App.camera.position);
                        animCam.getWorldQuaternion(App.camera.quaternion);
                    } else {
                        App.orbit.update();
                    }
                    App.renderer.render(App.scene, App.camera);
                    
                    // Force WebGL to flush using native WebGL context (fixes Three.js null target error)
                    const gl = App.renderer.getContext();
                    gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(4));
                    
                    const canvas = App.renderer.domElement;
                    const bitmap = await createImageBitmap(canvas);
                    
                    if (videoEncoder.state !== 'configured') break;

                    const frame = new VideoFrame(bitmap, { timestamp: f * 1000000 / fpsSetting });
                    videoEncoder.encode(frame, { keyFrame: f % fpsSetting === 0 });
                    frame.close();

                    currentTime += frameDuration;
                    if (f % 5 === 0) {
                        progressTxt.innerText = `Baking: ${Math.round((f/totalFrames)*100)}%`;
                        await new Promise(r => setTimeout(r, 0)); 
                    }
                }

                progressTxt.innerText = "Finalizing Video...";
                await videoEncoder.flush();
                muxer.finalize();

                const buffer = muxer.target.buffer;
                const blob = new Blob([buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `3D_Bake_${resSetting}_${fpsSetting}fps.mp4`; a.click();
                URL.revokeObjectURL(url);
                showToast("Bake Complete!");

            } catch(err) {
                console.error(err);
                showToast("Baking failed. Error logged.");
            }

            App.isBaking = false;
            App.isRecording = false;
            App.orbit.enabled = true;
            App.camera.position.copy(origPos);
            App.orbit.target.copy(origTarget);
            App.renderer.setSize(origW, origH);
            App.camera.aspect = origAspect;
            App.camera.updateProjectionMatrix();
            App.orbit.update();
            App.objects.forEach(j => { const v = getVisual(j); if(v && v.userData.isLight) v.material.visible = true; });
            
            if (animCam) {
                const v = getVisual(animCam);
                if (v) v.visible = oldCamVis;
            }
            
            overlay.classList.remove('active');
        }

        function exportVideoRealtime(resSetting, fpsSetting) {
            let maxDur = 3000;
            App.objects.forEach(joint => {
                const anim = joint.userData.anim;
                if (anim && anim.keys && anim.keys.length > 1) {
                    let d = anim.duration + (anim.delay || 0);
                    if(anim.loop !== 'none') d = Math.max(d, 8000);
                    maxDur = Math.max(maxDur, d);
                }
            });
            maxDur += 500; 

            const origPos = App.camera.position.clone();
            const origTarget = App.orbit.target.clone();
            const origW = window.innerWidth;
            const origH = window.innerHeight;
            const origAspect = App.camera.aspect;
            
            const animCam = getAnimCamera();
            let oldCamVis = true;

            if (animCam) {
                const v = getVisual(animCam);
                if (v) { oldCamVis = v.visible; v.visible = false; }
                App.isPreviewingCamera = true; 
            } else if (App.cameraSaved.set) {
                App.camera.position.copy(App.cameraSaved.pos);
                App.orbit.target.copy(App.cameraSaved.target);
            } else { saveRenderCamera(); }
            
            App.orbit.update();
            App.orbit.enabled = false; 

            if (resSetting !== 'screen') {
                const dims = { 
                    '480': [854, 480], 
                    '720': [1280, 720], 
                    '1080': [1920, 1080], 
                    '4k': [3840, 2160] 
                }[resSetting];
                App.renderer.setSize(dims[0], dims[1]);
                App.camera.aspect = dims[0] / dims[1];
                App.camera.updateProjectionMatrix();
                App.renderer.render(App.scene, App.camera); 
            }

            hideAllTabs();
            App.isRecording = true;
            stopAnimations();
            deselectObject();
            if(App.trajectoryLine) App.trajectoryLine.visible = false;
            
            App.objects.forEach(j => { const v = getVisual(j); if(v && v.userData.isLight) v.material.visible = false; });

            const stream = App.renderer.domElement.captureStream(fpsSetting);
            let recorder;
            try { 
                const opts = MediaRecorder.isTypeSupported('video/webm; codecs=vp9') ? { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 25000000 } : { videoBitsPerSecond: 25000000 };
                recorder = new MediaRecorder(stream, opts); 
            } catch(e) { recorder = new MediaRecorder(stream); }

            const chunks = [];
            recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
            
            recorder.onstop = () => {
                const ext = recorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                const url = URL.createObjectURL(new Blob(chunks, { type: recorder.mimeType || 'video/webm' }));
                const a = document.createElement('a');
                a.href = url; a.download = `3D_Export_${resSetting}_${fpsSetting}fps.${ext}`; a.click();
                URL.revokeObjectURL(url);
                
                App.isRecording = false;
                App.orbit.enabled = true;
                App.camera.position.copy(origPos);
                App.orbit.target.copy(origTarget);
                
                if (resSetting !== 'screen') {
                    App.renderer.setSize(origW, origH);
                    App.camera.aspect = origAspect;
                    App.camera.updateProjectionMatrix();
                }

                App.orbit.update();
                App.objects.forEach(j => { const v = getVisual(j); if(v && v.userData.isLight) v.material.visible = true; });

                if (animCam) {
                    App.isPreviewingCamera = false;
                    const v = getVisual(animCam);
                    if (v) v.visible = oldCamVis;
                }

                UI.recIndicator.classList.add('hidden');
                showToast("Video Export Complete!");
            };

            UI.recIndicator.classList.remove('hidden');
            showToast(`Recording ${resSetting.toUpperCase()} at ${fpsSetting} FPS...`);
            
            recorder.start();
            playAnimation(false);

            setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, maxDur);
        }

        function exportVideo() {
            if (App.isRecording) return;
            const resSetting = document.getElementById('export-res').value;
            const fpsSetting = parseInt(document.getElementById('export-fps').value) || 30;
            bakeVideo(resSetting, fpsSetting);
        }

        function animateLoop(time) {
            requestAnimationFrame(animateLoop);
            if (App.isBaking) return;
            
            TWEEN.update(time);
            updateDynamicGrid();
            
            if (App.isPreviewingCamera) {
                const animCam = getAnimCamera();
                if (animCam) {
                    animCam.getWorldPosition(App.camera.position);
                    animCam.getWorldQuaternion(App.camera.quaternion);
                } else {
                    App.isPreviewingCamera = false;
                    App.orbit.enabled = true;
                }
            } else {
                App.orbit.update();
            }

            App.renderer.render(App.scene, App.camera);
        }

        window.onload = init;

    </script>
</body>
    </html>
